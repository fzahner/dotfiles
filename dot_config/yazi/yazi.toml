[mgr]
ratio          = [ 2, 4, 3 ]
sort_by        = "alphabetical"
sort_sensitive = false
sort_reverse 	 = false
sort_dir_first = true
sort_translit  = false
linemode       = "none"
show_hidden    = true
show_symlink   = true
scrolloff      = 5
mouse_events   = [ "click", "scroll" ]
title_format   = "Yazi: {cwd}"

[plugin]
prepend_previewers = [
	# Archive previewer
	{ mime = "application/*zip",            run = "ouch" },
	{ mime = "application/x-tar",           run = "ouch" },
	{ mime = "application/x-bzip2",         run = "ouch" },
	{ mime = "application/x-7z-compressed", run = "ouch" },
	{ mime = "application/x-rar",           run = "ouch" },
	{ mime = "application/vnd.rar",         run = "ouch" },
	{ mime = "application/x-xz",            run = "ouch" },
	{ mime = "application/xz",              run = "ouch" },
	{ mime = "application/x-zstd",          run = "ouch" },
	{ mime = "application/zstd",            run = "ouch" },
	{ mime = "application/java-archive",    run = "ouch" },
]

[opener]
open = [
    { run = "xdg-open %s", desc = "Open" },
    { run = "firefox %s", desc = "Open with Firefox"},
    { run = "nvim %s", block = true, desc = "Open with Neovim" },
]
xournal = [
    { run = "xournalpp %s", orphan = true, desc = "Open with Xournal++"}
]
play = [
    { run = "xdg-open %s", desc = "Play" },
    { run = "vlc %s", orphan = true, desc = "Play with VLC" },
    { run = "mpv %s", orphan = true, desc = "Play with MPV" },
]
image = [
    { run = "feh %s", orphan = true, desc = "Open with feh" },
    { run = "nomacs %s", orphan = true, desc = "Open with nomacs" },
    { run = "xnviewmp %s", orphan = true, desc = "Edit with XnViewMP" },
    { run = "gimp %s", orphan = true, desc = "Edit with GIMP" },
]


[open]
prepend_rules = [
    { url = "*.xopp", use = "xournal" },
    { url = "*.pdf", use = [ "open", "xournal", "reveal" ] },
    { url = "*.jpg", use = [ "image", "open", "reveal" ] },
    { url = "*.jpeg", use = [ "image", "open", "reveal" ] },
    { url = "*.png", use = [ "image", "open", "reveal" ] },
]
