<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="#1a1a1a"/>
  
  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:0.5" />
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#grad)"/>
  
  <!-- Cat face with better spacing and typography -->
  <text
    x="128"
    y="140"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'SF Mono', 'Menlo', 'Consolas', monospace"
    font-size="72"
    font-weight="500"
    fill="#ffffff"
    letter-spacing="2">
    &gt;^_^&lt;
  </text>
  
  <!-- Optional: subtle shadow for depth -->
  <text
    x="128"
    y="142"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'SF Mono', 'Menlo', 'Consolas', monospace"
    font-size="72"
    font-weight="500"
    fill="#000000"
    opacity="0.3"
    letter-spacing="2">
    &gt;^_^&lt;
  </text>
  <text
    x="128"
    y="140"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'SF Mono', 'Menlo', 'Consolas', monospace"
    font-size="72"
    font-weight="500"
    fill="#ffffff"
    letter-spacing="2">
    &gt;^_^&lt;
  </text>
</svg>